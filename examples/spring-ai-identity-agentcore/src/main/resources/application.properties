server.port=8080

# AgentCore Identity
spring.agent-core.credentials.region=${AWS_REGION:us-east-1}

# Resource credential provider name (created in AgentCore)
app.resource-credential-provider-name=${RESOURCE_CREDENTIAL_PROVIDER_NAME:my-resource-provider}

# Bedrock model
spring.ai.bedrock.converse.chat.options.model=us.amazon.nova-lite-v1:0
