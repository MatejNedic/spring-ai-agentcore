# Local mode by default — no AWS credentials needed
agentcore.browser.mode=local

# Switch to AgentCore Browser service:
# agentcore.browser.mode=agentcore

agentcore.browser.viewport-width=1456
agentcore.browser.viewport-height=819
agentcore.browser.max-content-length=10000

# Target URL and output directory
app.url=https://spring.io
app.output-dir=screenshots
