server.port=8080

# Cognito OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cognito-idp.${AWS_REGION:us-east-1}.amazonaws.com/${COGNITO_USER_POOL_ID}

# AgentCore Identity
spring.agent-core.credentials.region=${AWS_REGION:us-east-1}

# Workload name (created in AgentCore)
app.workload-name=${WORKLOAD_NAME:my-workload}

# Resource credential provider name
app.resource-credential-provider-name=${RESOURCE_CREDENTIAL_PROVIDER_NAME:my-resource-provider}

# Bedrock model
spring.ai.bedrock.converse.chat.options.model=us.amazon.nova-lite-v1:0
